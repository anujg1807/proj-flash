name: Anthropic PM Job Monitor

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write           # needed to commit known_jobs.json

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit updated known_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add known_jobs.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update known_jobs.json [skip ci]"
          git push
